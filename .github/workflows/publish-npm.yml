name: Publish MCP to npm

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to publish (semver, e.g. 1.2.3)'
        required: true
        type: string
      npm_tag:
        description: 'npm dist-tag (e.g. latest, dev)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for OIDC provenance attestation

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Set version in package.json
        run: npm version "${{ inputs.version }}" --no-git-tag-version
        working-directory: apps/mcp

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and bundle MCP server
        run: |
          pnpm --filter @aurite-ai/kahuna build
          pnpm --filter @aurite-ai/kahuna bundle

      - name: Publish to npm
        run: npm publish --provenance --access public --tag "${{ inputs.npm_tag }}"
        working-directory: apps/mcp
