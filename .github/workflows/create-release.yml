name: Create Github Draft Release

on:
  workflow_call:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.2.3)'
        required: true
        type: string

jobs:
  create-draft-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/create-release.sh scripts/generate-release-notes.sh
          TAG="${{ inputs.tag }}"
          NOTES_FILE=$(mktemp)
          ./scripts/generate-release-notes.sh "$TAG" --branch main --out "$NOTES_FILE"
          ./scripts/create-release.sh "$TAG" --type draft --branch main --notes "$NOTES_FILE"
