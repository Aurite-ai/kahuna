name: Create Draft Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.2.3)'
        required: true

jobs:
  create-draft-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/create-release.sh scripts/generate-release-notes.sh
          TAG="${{ inputs.tag || github.ref_name }}"
          NOTES_FILE=$(mktemp)
          ./scripts/generate-release-notes.sh "$TAG" --branch main --out "$NOTES_FILE"
          ./scripts/create-release.sh "$TAG" --type draft --branch main --notes "$NOTES_FILE"
